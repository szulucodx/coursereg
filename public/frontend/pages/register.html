<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Register — BFU Course Registration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body class="register-page">
<script>
  if (window.location.port !== '3000') {
    window.location.replace('http://localhost:3000/register');
  }
</script>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a href="/login" class="navbar-brand">🎓 BFU Portal</a>
    <div class="d-flex align-items-center gap-3">
      <a href="/login" class="nav-link">Login</a>
      <a href="/register" class="nav-link active">Register</a>
      <a href="/courses" class="nav-link">Browse Courses</a>
      <a href="/my-courses" class="nav-link">My Courses</a>
    </div>
  </div>
</nav>
<div class="auth-wrapper register-auth">
  <div class="register-shell register-shell-full border-0 overflow-hidden">
    <div class="register-form-wrap p-4 p-md-5">
      <div class="register-hero-panel mb-4">
        <div class="register-chip mb-3">Admissions 2026</div>
        <h1 class="register-title mb-2">Join Bright Future University</h1>
        <p class="register-copy mb-0">Build your student profile in minutes and access course registration, timetables, and enrollment updates from one dashboard.</p>
        <div class="register-brand mt-3">
          <span class="register-brand-icon">🎓</span>
          <span>Create Student Account</span>
        </div>
      </div>

      <div id="msg"></div>

      <form id="regForm" class="register-form-grid" action="/register" method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">First Name</label>
            <input type="text" class="form-control" id="firstName" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Last Name</label>
            <input type="text" class="form-control" id="lastName" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">National ID</label>
            <input type="text" class="form-control" id="nationalID" placeholder="e.g. 200001/10/1" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Date of Birth</label>
            <input type="date" class="form-control" id="dateOfBirth" required/>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="you@bfu.ac.zm" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Phone</label>
            <input type="text" class="form-control" id="phone" placeholder="09XXXXXXXX"/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Year of Study</label>
            <select class="form-select" id="yearOfStudy" required>
              <option value="">Select year</option>
              <option value="1">Year 1</option>
              <option value="2">Year 2</option>
              <option value="3">Year 3</option>
              <option value="4">Year 4</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Programme</label>
            <select class="form-select" id="programme" required>
              <option value="">Select programme</option>
              <option>BSc Computer Science</option>
              <option>BSc Information Technology</option>
              <option>BSc Mathematics</option>
              <option>BA Business Administration</option>
              <option>BSc Accounting and Finance</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" class="form-control" id="password" minlength="6" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Confirm Password</label>
            <input type="password" class="form-control" id="confirm" required/>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mt-4" id="regBtn">
          Create Account
        </button>
      </form>

      <hr class="my-4"/>
      <p class="text-center mb-0 register-signin-text">
        Already registered? <a href="/login" class="fw-semibold">Login here</a>
      </p>
    </div>
  </div>
</div>

<script>
  document.getElementById('regForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pass    = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const msg     = document.getElementById('msg');

    if (pass !== confirm) {
      msg.innerHTML = `<div class="alert alert-danger">Passwords do not match.</div>`;
      return;
    }

    const btn = document.getElementById('regBtn');
    const originalText = btn.textContent;

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nationalID:  document.getElementById('nationalID').value,
          firstName:   document.getElementById('firstName').value,
          lastName:    document.getElementById('lastName').value,
          email:       document.getElementById('email').value,
          phone:       document.getElementById('phone').value,
          dateOfBirth: document.getElementById('dateOfBirth').value,
          programme:   document.getElementById('programme').value,
          yearOfStudy: document.getElementById('yearOfStudy').value,
          password:    pass
        })
      });

      const data = await res.json().catch(() => null);

      if (!res.ok) {
        throw new Error(data?.message || 'Registration failed. Please try again.');
      }

      if (data && data.success) {
        msg.innerHTML = `<div class="alert alert-success">✅ ${data.message}</div>`;
        setTimeout(() => window.location.href = '/login', 1800);
        return;
      }

      throw new Error(data?.message || 'Registration failed. Please try again.');
    } catch (err) {
      msg.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      btn.disabled = false;
      btn.textContent = originalText;
    }
  });
</script>
</body>
</html>
