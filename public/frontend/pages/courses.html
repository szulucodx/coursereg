<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Browse Courses — BFU</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<script>
  if (window.location.port === '5501') {
    window.location.replace('http://localhost:3000/courses');
  }
</script>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a href="/dashboard" class="navbar-brand">🎓 BFU Portal</a>
    <div class="d-flex align-items-center gap-3">
      <a href="/courses"    class="nav-link active">Browse Courses</a>
      <a href="/my-courses.php" class="nav-link">My Courses</a>
      <span class="text-white-50">|</span>
      <span class="text-white fw-semibold" id="nav-username"></span>
      <button class="btn btn-sm btn-outline-light" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold" style="color:#1A3C5E;">Available Courses</h3>
    <span class="text-muted small">Semester 1 – 2026</span>
  </div>

  <!-- Search / Filter -->
  <div class="card p-3 mb-4">
    <div class="row g-2">
      <div class="col-md-5">
        <input type="text" class="form-control" id="searchInput"
               placeholder="🔍  Search by course name or code..."/>
      </div>
      <div class="col-md-4">
        <select class="form-select" id="deptFilter">
          <option value="">All Departments</option>
        </select>
      </div>
      <div class="col-md-3">
        <select class="form-select" id="seatsFilter">
          <option value="">All Courses</option>
          <option value="available">Seats Available</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Course grid -->
  <div class="row g-4" id="courseGrid">
    <div class="col-12 text-center py-5 text-muted">Loading courses...</div>
  </div>
</div>

<!-- Course Details Modal -->
<div class="modal fade" id="detailsModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header" style="background:#1A3C5E; color:white;">
        <h5 class="modal-title">Course Details</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap mb-3">
          <div>
            <div class="fw-bold fs-5" id="details-code"></div>
            <div class="text-muted" id="details-name"></div>
          </div>
          <div class="text-end">
            <div class="badge dept-badge" style="background:#1A3C5E;" id="details-dept"></div>
            <div class="mt-2 fw-semibold text-muted small" id="details-credit"></div>
          </div>
        </div>
        <p class="text-muted mb-3" id="details-description"></p>
        <div class="row g-3">
          <div class="col-md-4"><div class="p-3 rounded bg-light"><div class="small text-muted">Lecturer</div><div class="fw-semibold" id="details-lecturer"></div></div></div>
          <div class="col-md-4"><div class="p-3 rounded bg-light"><div class="small text-muted">Semester</div><div class="fw-semibold" id="details-semester"></div></div></div>
          <div class="col-md-4"><div class="p-3 rounded bg-light"><div class="small text-muted">Seats</div><div class="fw-semibold" id="details-seats"></div></div></div>
        </div>
        <div class="mt-3 small" id="details-prereqs"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button class="btn btn-success fw-bold" id="detailsEnrolBtn">Enrol Now</button>
      </div>
    </div>
  </div>
</div>

<!-- Enrol Modal -->
<div class="modal fade" id="enrolModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" style="background:#1A3C5E; color:white;">
        <h5 class="modal-title">Confirm Enrolment</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>You are about to enrol in:</p>
        <div class="p-3 rounded" style="background:#f0f4f8;">
          <div class="fw-bold fs-5" id="modal-code"></div>
          <div class="text-muted"  id="modal-name"></div>
          <div class="mt-2 small"  id="modal-prereqs"></div>
        </div>
        <div id="modal-msg" class="mt-3"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-success fw-bold" id="confirmEnrolBtn">✅ Confirm Enrolment</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
  let allCourses = [];
  let selectedCode = '';
  let detailsCode = '';
  const detailsModal = new bootstrap.Modal(document.getElementById('detailsModal'));
  const modal = new bootstrap.Modal(document.getElementById('enrolModal'));
  (async () => {
    const student = await requireAuth();
    if (!student) return;
    setNavUser(student);
    await loadCourses();
  })();

  async function loadCourses() {
    const res  = await fetch('/api/courses');
    const data = await res.json();
    if (!data.success) return;
    allCourses = data.courses;

    // Populate department filter
    const depts = [...new Set(allCourses.map(c => c.DepartmentName))];
    const df = document.getElementById('deptFilter');
    depts.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d; opt.textContent = d;
      df.appendChild(opt);
    });

    renderCourses(allCourses);
  }

  function renderCourses(courses) {
    const grid = document.getElementById('courseGrid');
    if (courses.length === 0) {
      grid.innerHTML = '<div class="col-12 text-center py-5 text-muted">No courses found.</div>';
      return;
    }
    grid.innerHTML = courses.map(c => {
      const left = c.SeatsLeft;
      const seatClass = left <= 0 ? 'seats-full' : left <= 5 ? 'seats-low' : 'seats-ok';
      const seatText  = left <= 0 ? '🔴 Full' : `🟢 ${left} seats left`;
      return `
      <div class="col-md-6 col-lg-4">
        <div class="card course-card h-100">
          <div class="card-body d-flex flex-column">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <span class="badge dept-badge" style="background:#1A3C5E;">${c.DepartmentName}</span>
              <span class="badge" style="background:#6c757d;">${c.CreditHours} Credits</span>
            </div>
            <div class="fw-bold text-muted small">${c.CourseCode}</div>
            <h6 class="fw-bold mb-2" style="color:#1A3C5E;">${c.CourseName}</h6>
            <div class="text-muted small mb-1">👨‍🏫 ${c.LecturerName || 'TBA'}</div>
            <div class="text-muted small mb-2">📅 ${c.Semester}</div>
            <div class="text-muted small mb-3">${c.Description ? c.Description.slice(0, 100) + (c.Description.length > 100 ? '...' : '') : 'No description available.'}</div>
            <div class="d-flex justify-content-between align-items-center mt-auto gap-2">
              <span class="${seatClass} small">${seatText}</span>
              <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-primary fw-semibold" onclick="openCourseDetails('${c.CourseCode}')">Details</button>
                <button
                  class="btn btn-sm btn-primary fw-semibold"
                  ${left <= 0 ? 'disabled' : ''}
                  onclick="openEnrolModal('${c.CourseCode}', '${c.CourseName.replace(/'/g,"\\'")}')">
                  Enrol
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // Filter logic
  function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const dept   = document.getElementById('deptFilter').value;
    const seats  = document.getElementById('seatsFilter').value;
    const filtered = allCourses.filter(c => {
      const matchSearch = c.CourseName.toLowerCase().includes(search) ||
                          c.CourseCode.toLowerCase().includes(search);
      const matchDept   = !dept || c.DepartmentName === dept;
      const matchSeats  = seats !== 'available' || c.SeatsLeft > 0;
      return matchSearch && matchDept && matchSeats;
    });
    renderCourses(filtered);
  }

  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('deptFilter').addEventListener('change', applyFilters);
  document.getElementById('seatsFilter').addEventListener('change', applyFilters);

  async function openEnrolModal(code, name) {
    selectedCode = code;
    document.getElementById('modal-code').textContent = code;
    document.getElementById('modal-name').textContent = name;
    document.getElementById('modal-msg').innerHTML = '';

    // Load prerequisites
    const res  = await fetch(`/api/courses/${code}/prerequisites`);
    const data = await res.json();
    const pre  = document.getElementById('modal-prereqs');
    if (data.prerequisites && data.prerequisites.length > 0) {
      pre.innerHTML = `<span class="text-warning">⚠️ Prerequisites: </span>` +
        data.prerequisites.map(p => `<strong>${p.PrerequisiteCode}</strong> (${p.CourseName})`).join(', ');
    } else {
      pre.innerHTML = `<span class="text-success">✅ No prerequisites required</span>`;
    }
    modal.show();
  }

  async function openCourseDetails(code) {
    detailsCode = code;
    const course = allCourses.find(c => c.CourseCode === code);
    if (!course) return;

    document.getElementById('details-code').textContent = course.CourseCode;
    document.getElementById('details-name').textContent = course.CourseName;
    document.getElementById('details-dept').textContent = course.DepartmentName;
    document.getElementById('details-credit').textContent = `${course.CreditHours} Credit Hours`;
    document.getElementById('details-description').textContent = course.Description || 'No course description available.';
    document.getElementById('details-lecturer').textContent = course.LecturerName || 'TBA';
    document.getElementById('details-semester').textContent = course.Semester;
    document.getElementById('details-seats').textContent = course.SeatsLeft <= 0
      ? 'Full'
      : `${course.SeatsLeft} of ${course.MaxCapacity} seats left`;

    const res  = await fetch(`/api/courses/${code}/prerequisites`);
    const data = await res.json();
    const pre  = document.getElementById('details-prereqs');
    if (data.prerequisites && data.prerequisites.length > 0) {
      pre.innerHTML = `<span class="text-warning">⚠️ Prerequisites: </span>` +
        data.prerequisites.map(p => `<strong>${p.PrerequisiteCode}</strong> (${p.CourseName})`).join(', ');
    } else {
      pre.innerHTML = `<span class="text-success">✅ No prerequisites required</span>`;
    }

    document.getElementById('detailsEnrolBtn').onclick = () => {
      detailsModal.hide();
      openEnrolModal(code, course.CourseName);
    };

    detailsModal.show();
  }

  document.getElementById('confirmEnrolBtn').addEventListener('click', async () => {
    const btn = document.getElementById('confirmEnrolBtn');
    btn.disabled = true; btn.textContent = 'Enrolling...';

    const res  = await fetch('/api/enrollment/enrol', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ courseCode: selectedCode })
    });
    const data = await res.json();

    document.getElementById('modal-msg').innerHTML =
      `<div class="alert alert-${data.success ? 'success' : 'danger'}">${data.message}</div>`;

    btn.disabled = false; btn.textContent = '✅ Confirm Enrolment';

    if (data.success) {
      showToast(data.message, 'success');
      setTimeout(() => { modal.hide(); loadCourses(); }, 1500);
    }
  });
</script>
</body>
</html>
